version: '3.8'

services:
  crime-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./crime_data_2024.csv:/app/crime_data_2024.csv:ro
      - ./random_forest_model.joblib:/app/random_forest_model.joblib:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
